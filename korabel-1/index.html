<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Корабель1</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ef;
        --ink: #1f2426;
        --muted: #667174;
        --line: #d9d2c8;
        --panel: #ffffff;
        --accent: #1f6f78;
        --accent-strong: #15535b;
        --warn: #8a2d1f;
        --bar: #b9c7b8;
        --bar-strong: #557f78;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .small {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .player {
        margin-top: 22px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 20px 60px rgb(31 36 38 / 0.08);
      }

      .transport {
        display: grid;
        grid-template-columns: 52px minmax(92px, max-content) 1fr;
        gap: 14px;
        align-items: center;
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }

      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }

      button:hover { border-color: var(--accent); }

      button.is-active,
      .play {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .play {
        width: 52px;
        height: 44px;
        font-size: 1.05rem;
      }

      .time {
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        white-space: nowrap;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .error {
        display: none;
        margin: 0;
        padding: 12px 18px;
        color: var(--warn);
        border-bottom: 1px solid var(--line);
      }

      .tracks { position: relative; }

      .track {
        display: grid;
        grid-template-columns: minmax(230px, 300px) 1fr;
        border-bottom: 1px solid var(--line);
        min-height: 96px;
      }

      .track:last-child { border-bottom: 0; }

      .track-meta {
        padding: 16px 18px;
        border-right: 1px solid var(--line);
      }

      .track-name {
        font-weight: 700;
        margin-bottom: 3px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
      }

      .toggle {
        width: 40px;
        min-height: 34px;
        font-weight: 700;
      }

      .volume { max-width: 130px; }

      .lane {
        position: relative;
        min-height: 96px;
        padding: 16px;
        overflow: hidden;
      }

      .lane-playhead {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0%;
        width: 2px;
        background: var(--accent-strong);
        pointer-events: none;
        z-index: 2;
      }

      .bars {
        height: 64px;
        display: grid;
        grid-template-columns: repeat(96, 1fr);
        gap: 3px;
        align-items: center;
      }

      .bars span {
        display: block;
        min-height: 4px;
        border-radius: 999px;
        background: var(--bar);
      }

      .track:nth-child(2n) .bars span { background: #c4b9ca; }
      .track:nth-child(3n) .bars span { background: #c5bea3; }

      .track.is-solo .bars span,
      .track:not(.is-muted) .bars span:hover {
        background: var(--bar-strong);
      }

      .track.is-muted { opacity: 0.52; }

      audio { display: none; }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 20px, 1120px);
          padding-top: 22px;
        }

        .transport { grid-template-columns: 52px 1fr; }
        .timeline { grid-column: 1 / -1; }
        .track { grid-template-columns: 1fr; }

        .track-meta {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .lane {
          min-height: 76px;
          padding-top: 12px;
        }

        .bars {
          height: 48px;
          gap: 2px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Корабель1</h1>
      <p class="small">Published static mix player. Use headphones for the best sync.</p>

      <section class="player" aria-label="Multitrack player">
        <div class="transport">
          <button class="play" id="playButton" type="button" aria-label="Start playback">▶</button>
          <div class="time" id="timeReadout">0:00 / 0:00</div>
          <input class="timeline" id="timeline" aria-label="Timeline" type="range" min="0" max="1" step="0.1" value="0">
        </div>
        <p class="error" id="error"></p>
        <div class="tracks" id="tracks"></div>
      </section>
    </main>

    <script>
      const tracks = [
        {
                "id": "af7547eb-e53e-4e58-8c80-18643c87e158",
                "displayName": "Пика",
                "uploadedBy": "Пика",
                "src": "audio/af7547eb.m4a",
                "offsetMs": 0,
                "gainDb": -2.6,
                "initialVolume": 0.21,
                "bytes": 4492370
        },
        {
                "id": "7334bf40-b70a-4e0a-96ed-b325e4f3b9f4",
                "displayName": "полина",
                "uploadedBy": "полина",
                "src": "audio/7334bf40.m4a",
                "offsetMs": 4660,
                "gainDb": -6.5,
                "initialVolume": 0.49,
                "bytes": 4377283
        },
        {
                "id": "ee31264e-c2b5-4e25-857a-d608fb2330bf",
                "displayName": "Olga",
                "uploadedBy": "Olga",
                "src": "audio/olga.m4a",
                "offsetMs": 8780,
                "gainDb": -7.9,
                "initialVolume": 1,
                "bytes": 4315683
        },
        {
                "id": "ad26373e-a0d9-4598-9398-024792cb13c8",
                "displayName": "Люсиль",
                "uploadedBy": "Люсиль",
                "src": "audio/ad26373e.m4a",
                "offsetMs": 8100,
                "gainDb": -2.74,
                "initialVolume": 0.28,
                "bytes": 4306600
        },
        {
                "id": "7e641c04-3fa9-42f8-ac58-8074187bdb90",
                "displayName": "Ira",
                "uploadedBy": "Ira",
                "src": "audio/ira.m4a",
                "offsetMs": 7280,
                "gainDb": -4.43,
                "initialVolume": 0.54,
                "bytes": 4293660
        }
];
      const state = {
        isPlaying: false,
        positionSec: 0,
        durationSec: 0,
        anchorPositionSec: 0,
        anchorTimeMs: 0,
        animationFrame: null,
        muted: Object.fromEntries(tracks.map((track) => [track.id, false])),
        solo: new Set(),
        volume: Object.fromEntries(tracks.map((track) => [track.id, track.initialVolume ?? 1])),
        audioById: {},
        audioContext: null,
        decodedBuffers: {},
        activeNodes: {}
      };

      const PLAYBACK_READY_TIMEOUT_MS = 60000;
      const PLAYBACK_SCHEDULE_DELAY_SEC = 0.12;

      const playButton = document.getElementById("playButton");
      const timeline = document.getElementById("timeline");
      const timeReadout = document.getElementById("timeReadout");
      const tracksEl = document.getElementById("tracks");
      const errorEl = document.getElementById("error");

      function dbToLinear(db) {
        return Math.pow(10, db / 20);
      }

      function formatTime(seconds) {
        if (!Number.isFinite(seconds)) return "0:00";
        const minutes = Math.floor(seconds / 60);
        const remaining = String(Math.floor(seconds % 60)).padStart(2, "0");
        return `${minutes}:${remaining}`;
      }

      function waveformBars(trackId) {
        let seed = 0;
        for (const char of trackId) seed = (seed * 31 + char.charCodeAt(0)) % 9973;
        return Array.from({ length: 96 }, (_, index) => {
          seed = (seed * 73 + index * 19 + 37) % 9973;
          const contour = 0.45 + 0.35 * Math.sin(index / 5) + 0.2 * Math.sin(index / 13);
          return Math.max(0.14, Math.min(1, contour * (0.55 + seed / 9973)));
        });
      }

      function localTime(track, transportPositionSec) {
        return transportPositionSec - track.offsetMs / 1000;
      }

      function setError(message) {
        errorEl.textContent = message;
        errorEl.style.display = message ? "block" : "none";
      }

      function getAudioContext() {
        if (state.audioContext) return state.audioContext;
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) {
          throw new Error("This browser does not support synchronized multitrack playback.");
        }
        state.audioContext = new AudioContextCtor();
        return state.audioContext;
      }

      function trackOutputVolume(track) {
        const soloMode = state.solo.size > 0;
        const audibleBySolo = !soloMode || state.solo.has(track.id);
        const shouldMute = state.muted[track.id] || !audibleBySolo;
        const gain = dbToLinear(track.gainDb);
        return shouldMute ? 0 : Math.max(0, Math.min(1, state.volume[track.id] * gain));
      }

      function stopScheduledSources() {
        Object.values(state.activeNodes).forEach(({ source }) => {
          source.onended = null;
          try {
            source.stop();
          } catch {
            // The source may already have ended.
          }
        });
        state.activeNodes = {};
      }

      async function loadDecodedTrack(track) {
        if (state.decodedBuffers[track.id]) {
          return state.decodedBuffers[track.id];
        }

        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), PLAYBACK_READY_TIMEOUT_MS);

        try {
          const response = await fetch(track.src, { signal: controller.signal });
          if (!response.ok) {
            throw new Error(`Could not load audio for ${track.displayName} (${response.status}).`);
          }

          const audioContext = getAudioContext();
          const arrayBuffer = await response.arrayBuffer();
          const decoded = await audioContext.decodeAudioData(arrayBuffer.slice(0));
          state.decodedBuffers[track.id] = decoded;
          state.durationSec = Math.max(state.durationSec, decoded.duration + track.offsetMs / 1000);
          timeline.max = String(Math.max(state.durationSec, 1));
          updateReadout();
          return decoded;
        } catch (error) {
          if (error.name === "AbortError") {
            throw new Error(`${track.displayName} is still loading. Try again in a moment.`);
          }
          throw error;
        } finally {
          window.clearTimeout(timeout);
        }
      }

      async function prepareTracks(startPositionSec) {
        const prepared = await Promise.all(tracks.map(async (track) => {
          const buffer = await loadDecodedTrack(track);
          const trackTime = localTime(track, startPositionSec);
          if (trackTime >= buffer.duration) return null;
          return {
            track,
            buffer,
            bufferOffsetSec: Math.max(0, trackTime),
            startDelaySec: Math.max(0, -trackTime)
          };
        }));

        return prepared.filter(Boolean);
      }

      function applyVolumes() {
        const soloMode = state.solo.size > 0;
        tracks.forEach((track) => {
          const row = document.querySelector(`[data-track-id="${track.id}"]`);
          if (!row) return;
          const audibleBySolo = !soloMode || state.solo.has(track.id);
          row.classList.toggle("is-muted", Boolean(state.muted[track.id] || (soloMode && !state.solo.has(track.id))));
          row.classList.toggle("is-solo", state.solo.has(track.id));
          row.querySelector(".mute").classList.toggle("is-active", state.muted[track.id]);
          row.querySelector(".solo").classList.toggle("is-active", state.solo.has(track.id));
          row.querySelector(".mute").setAttribute("aria-pressed", String(state.muted[track.id]));
          row.querySelector(".solo").setAttribute("aria-pressed", String(state.solo.has(track.id)));
          if (state.activeNodes[track.id]) {
            state.activeNodes[track.id].gain.gain.value = trackOutputVolume(track);
          }
        });
      }

      function refreshDuration() {
        const nextDuration = tracks.reduce((max, track) => {
          const audio = state.audioById[track.id];
          if (!audio || !Number.isFinite(audio.duration)) return max;
          return Math.max(max, audio.duration + track.offsetMs / 1000);
        }, 0);
        if (nextDuration > 0) {
          state.durationSec = nextDuration;
          timeline.max = String(Math.max(nextDuration, 1));
          updateReadout();
        }
      }

      function updateReadout() {
        timeReadout.textContent = `${formatTime(state.positionSec)} / ${formatTime(state.durationSec)}`;
        timeline.value = String(Math.min(state.positionSec, state.durationSec || state.positionSec));
        const pct = state.durationSec > 0 ? Math.max(0, Math.min(100, state.positionSec / state.durationSec * 100)) : 0;
        document.querySelectorAll(".lane-playhead").forEach((item) => {
          item.style.left = `${pct}%`;
        });
      }

      function setTransportPosition(nextPositionSec) {
        const clamped = Math.max(0, Math.min(nextPositionSec, state.durationSec || nextPositionSec));
        state.positionSec = clamped;
        state.anchorPositionSec = clamped;
        state.anchorTimeMs = performance.now();
        updateReadout();
      }

      function stopPlayback(reset = false) {
        state.isPlaying = false;
        stopScheduledSources();
        playButton.textContent = "▶";
        playButton.disabled = false;
        playButton.setAttribute("aria-label", "Start playback");
        if (state.animationFrame) {
          cancelAnimationFrame(state.animationFrame);
          state.animationFrame = null;
        }
        if (reset) setTransportPosition(0);
      }

      function tick() {
        state.positionSec = Math.max(0, state.anchorPositionSec + (performance.now() - state.anchorTimeMs) / 1000);
        if (state.durationSec > 0 && state.positionSec >= state.durationSec) {
          stopPlayback(true);
          return;
        }
        updateReadout();
        state.animationFrame = requestAnimationFrame(tick);
      }

      async function startPlayback() {
        setError("");
        refreshDuration();
        if (state.durationSec > 0 && state.positionSec >= state.durationSec - 0.05) {
          setTransportPosition(0);
        }
        applyVolumes();

        playButton.disabled = true;
        playButton.textContent = "…";
        let preparedTracks = [];
        try {
          const audioContext = getAudioContext();
          if (audioContext.state === "suspended") {
            await audioContext.resume();
          }
          preparedTracks = await prepareTracks(state.positionSec);
        } catch (error) {
          setError(error.message || "Audio is still buffering.");
          playButton.disabled = false;
          playButton.textContent = "▶";
          return;
        }

        if (preparedTracks.length === 0) {
          setError("No playable tracks at this position.");
          playButton.disabled = false;
          playButton.textContent = "▶";
          return;
        }

        stopScheduledSources();
        const audioContext = getAudioContext();
        const startAt = audioContext.currentTime + PLAYBACK_SCHEDULE_DELAY_SEC;
        const nextActiveNodes = {};

        preparedTracks.forEach(({ track, buffer, bufferOffsetSec, startDelaySec }) => {
          const source = audioContext.createBufferSource();
          const gain = audioContext.createGain();
          source.buffer = buffer;
          gain.gain.value = trackOutputVolume(track);
          source.connect(gain);
          gain.connect(audioContext.destination);
          source.onended = () => {
            delete state.activeNodes[track.id];
            if (state.isPlaying && Object.keys(state.activeNodes).length === 0) {
              stopPlayback(false);
            }
          };

          nextActiveNodes[track.id] = { source, gain };
          source.start(startAt + startDelaySec, bufferOffsetSec);
        });

        state.activeNodes = nextActiveNodes;
        state.anchorPositionSec = state.positionSec;
        state.anchorTimeMs = performance.now() + PLAYBACK_SCHEDULE_DELAY_SEC * 1000;
        state.isPlaying = true;
        playButton.disabled = false;
        playButton.textContent = "■";
        playButton.setAttribute("aria-label", "Stop playback");
        tick();
      }

      function render() {
        tracks.forEach((track) => {
          const row = document.createElement("div");
          row.className = "track";
          row.dataset.trackId = track.id;

          const meta = document.createElement("div");
          meta.className = "track-meta";
          meta.innerHTML = `
            <div class="track-name">${track.displayName}</div>
            <div class="small">by ${track.uploadedBy}</div>
            <div class="controls">
              <button class="toggle mute" type="button" aria-label="Mute ${track.displayName}">M</button>
              <button class="toggle solo" type="button" aria-label="Solo ${track.displayName}">S</button>
              <input class="volume" aria-label="${track.displayName} volume" type="range" min="0" max="1" step="0.01" value="${track.initialVolume ?? 1}">
            </div>
          `;

          const lane = document.createElement("div");
          lane.className = "lane";
          const lanePlayhead = document.createElement("div");
          lanePlayhead.className = "lane-playhead";
          lanePlayhead.setAttribute("aria-hidden", "true");
          const bars = document.createElement("div");
          bars.className = "bars";
          waveformBars(track.id).forEach((height) => {
            const bar = document.createElement("span");
            bar.style.height = `${Math.round(height * 100)}%`;
            bars.appendChild(bar);
          });
          lane.append(lanePlayhead, bars);

          const audio = document.createElement("audio");
          audio.preload = "auto";
          audio.src = track.src;
          audio.addEventListener("loadedmetadata", refreshDuration);
          audio.addEventListener("error", () => {
            setError(`Could not load audio for ${track.displayName}.`);
            stopPlayback(false);
          });
          state.audioById[track.id] = audio;

          meta.querySelector(".mute").addEventListener("click", () => {
            state.muted[track.id] = !state.muted[track.id];
            applyVolumes();
          });

          meta.querySelector(".solo").addEventListener("click", () => {
            if (state.solo.has(track.id)) {
              state.solo.delete(track.id);
            } else {
              state.solo.add(track.id);
            }
            applyVolumes();
          });

          meta.querySelector(".volume").addEventListener("input", (event) => {
            state.volume[track.id] = Number(event.currentTarget.value);
            applyVolumes();
          });

          row.append(meta, lane, audio);
          tracksEl.appendChild(row);
        });

        applyVolumes();
        updateReadout();
      }

      playButton.addEventListener("click", () => {
        if (state.isPlaying) {
          stopPlayback(true);
        } else {
          startPlayback();
        }
      });

      timeline.addEventListener("input", (event) => {
        setError("");
        const nextPositionSec = Number(event.currentTarget.value);
        const wasPlaying = state.isPlaying;
        if (wasPlaying) {
          stopPlayback(false);
        }
        setTransportPosition(nextPositionSec);
        if (wasPlaying) {
          startPlayback();
        }
      });

      render();
    </script>
  </body>
</html>
